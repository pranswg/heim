{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heim Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; color: white; }
        .sidebar a { color: rgba(255,255,255,0.75); text-decoration: none; display: block; padding: 10px 15px; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar p-3">
                <h4 class="text-center mb-4 text-warning">🏡 HEIM</h4>
                <hr>
                <ul class="nav flex-column gap-1">
                    <li class="nav-item"><a href="{% url 'home' %}" class="nav-link rounded">Dashboard</a></li>
                    <li class="nav-item"><a href="{% url 'inventory-list' %}" class="nav-link rounded {% if 'inventory' in request.path %}active{% endif %}">📦 Inventory Supplies</a></li>
                    <li class="nav-item"><a href="{% url 'expense-list' %}" class="nav-link rounded {% if 'expense' in request.path %}active{% endif %}">💰 Expense Outlays</a></li>
                    <li class="nav-item"><a href="{% url 'request-list' %}" class="nav-link rounded {% if 'request' in request.path %}active{% endif %}">📋 Personal Requests</a></li>
                </ul>
            </div>
            
            <div class="col-md-9 col-lg-10 p-4">
                <header class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <h2 class="h4">Household Analytics Node</h2>
                    <span class="badge bg-dark text-light px-3 py-2">Session: Active Admin</span>
                </header>
                
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
