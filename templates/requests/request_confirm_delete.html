{% extends 'base.html' %}

{% block title %}Delete Confirmation | Heim{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 border-top border-danger border-4 mx-auto mt-5" style="max-width: 500px;">
    <div class="card-body p-4 text-center">
        <h4 class="fw-bold text-danger mb-3">Withdraw Request?</h4>
        <p class="text-muted">Are you sure you want to permanently delete the tracking request for <strong>"{{ object.item_name }}"</strong>?</p>
        <hr class="my-4">
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
                <a href="{% url 'request-list' %}" class="btn btn-light border px-4">Cancel</a>
                <button type="submit" class="btn btn-danger px-4">Withdraw</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
